<!doctype html>
<html lang="en" data-bs-theme="dark">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

        <!-- Styles -->
        <link rel="stylesheet" type="text/css" href="/style/bootstrap.min.css" />
        <link rel="stylesheet" type="text/css" href="/style/sticky-footer-navbar.css" />
        <link rel="stylesheet" type="text/css" href="/style/style.css" />
        <link rel="stylesheet" type="text/css" href="/style/display.css" />

        <title>PIXELIX</title>
        <link rel="shortcut icon" type="image/png" href="/favicon.png" />
    </head>
    <body class="d-flex flex-column h-100">
        <header>
            <!-- Fixed navbar -->
            <nav class="navbar navbar-expand-md navbar-dark fixed-top bg-dark">
                <a class="navbar-brand" href="/index.html">
                    <img src="/images/LogoSmall.png" alt="PIXELIX" />
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse" aria-controls="navbarCollapse" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarCollapse">
                    <ul class="navbar-nav me-auto" id="menu">
                    </ul>
                </div>
            </nav>
        </header>

        <!-- Begin page content -->
        <main role="main" class="flex-shrink-0">
            <!-- Dialog -->
            <div class="modal fade" id="modalDialog" tabindex="-1" aria-labelledby="modalTitle" aria-hidden="true" data-bs-keyboard="false" data-bs-backdrop="static">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header" id="dialogHeader">
                            <h5 class="modal-title" id="dialogTitle"></h5>
                        </div>
                        <div class="modal-body" id="dialogBody">
                        </div>
                        <div class="modal-footer" id="dialogFooter">
                        </div>
                    </div>
                </div>
            </div>
            <!-- Main view -->
            <div class="container">
                <h1 class="mt-5">Display</h1>
                <p>Slot: <span id="slotId" class="monospace">-</span></p>
                <canvas id="canvas" width="353" height="89" style="border: 1px solid #000000; background-color: black;"></canvas>
                <div class="h-100 p-2 bg-body-tertiary border rounded-3 mt-2">
                    <form>
                        <div class="form-group mb-3">
                            <button id="displayPowerButton" class="btn btn-light" type="button" onclick="triggerDisplayState()" value="off" disabled>Power Off</button>
                            <button id="updateDisplayButton" class="btn btn-light" type="button" onclick="updateDisplay()" value="false" disabled>Enable auto. display update</button>
                            <button class="btn btn-light" type="button" onclick="prevSlot()" disabled>Previous slot</button>
                            <button class="btn btn-light" type="button" onclick="nextSlot()" disabled>Next slot</button>
                        </div>
                    </form>
                </div>
                <div class="h-100 p-2 bg-body-tertiary border rounded-3 mt-2">
                    <form>
                        <div class="form-group mb-3">
                            <label class="form-label" for="bNextEffect">Currently active fade effect: <span id="lableFadeEffect" class="text-primary"> Linear</span></label>
                            <button class="btn btn-light" id="bNextEffect" type="button" onclick="nextEffect()" disabled>Next fade effect</button>
                        </div>
                    </form>
                </div>
                <p>Note, you can move the plugins with drag'n drop to other slots.</p>

                <!-- Legend -->
                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-color locked"></div>
                        <span>Locked - cannot be removed</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color sticky"></div>
                        <span>Sticky - scheduling stopped</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color both"></div>
                        <span>Both locked and sticky</span>
                    </div>
                </div>

                <!-- Slots Grid -->
                <div id="divSlots" class="slot-grid">
                </div>

                <div class="h-100 p-2 bg-body-tertiary border rounded-3 mt-2">
                    <form>
                        <div class="form-group mb-3">
                            <select class="form-select" id="pluginToInstall" size="1">
                            </select>
                            <br />
                            <button class="btn btn-light" type="button" onclick="install()" disabled>Install</button>
                        </div>
                    </form>
                </div>
                <div class="h-100 p-2 bg-body-tertiary border rounded-3 mt-2">
                    <form>
                        <div class="form-group mb-3">
                            <label class="form-label" for="bAutoBrightnessCtrl">Automatic brightness control: <span id="autoBrightnessStatus" class="text-primary">?</span></label>
                            <button class="btn btn-light" id="bAutoBrightnessCtrl" type="button" value="false" onclick="triggerAutoBrightnessCtrl();changeBrightness();" disabled>Enable</button>
                        </div>
                        <div class="form-group mb-3">
                            <label class="form-label" for="currentBrightness">Current Brightness:</label>
                            <div class="text-primary" id="currentBrightnessValue">?</div>
                            <input type="range" class="form-range" id="currentBrightness" min="0" max="255" onchange="changeBrightness();" oninput="$('#currentBrightnessValue').text(calcPercentage(this.value) + ' %')" disabled />
                        </div>
                        <div class="form-group mb-3">
                            <label class="form-label" for="minBrightness">Min. brightness soft limit:</label>
                            <div class="text-primary" id="minBrightnessValue">?</div>
                            <input type="range" class="form-range" id="minBrightness" min="0" max="255" onchange="changeBrightness();" oninput="$('#minBrightnessValue').text(calcPercentage(this.value) + ' %')" disabled />
                        </div>
                        <div class="form-group mb-3">
                            <label class="form-label" for="maxBrightness">Max. brightness soft limit:</label>
                            <div class="text-primary" id="maxBrightnessValue">?</div>
                            <input type="range" class="form-range" id="maxBrightness" min="0" max="255" onchange="changeBrightness();" oninput="$('#maxBrightnessValue').text(calcPercentage(this.value) + ' %')" disabled />
                        </div>
                    </form>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer mt-auto py-3">
            <div class="container">
                <hr />
                <span class="text-secondary">Copyright (c) 2019 - 2026 Andreas Merkle (web@blue-andi.de)</span><br />
                <span class="text-secondary"><a href="https://github.com/BlueAndi/Pixelix/blob/master/LICENSE">MIT License</a></span>
            </div>
        </footer>

        <!-- jQuery, and Bootstrap JS bundle -->
        <script type="text/javascript" src="/js/jquery-3.7.1.slim.min.js"></script>
        <script type="text/javascript" src="/js/bootstrap.bundle.min.js"></script>
        <!-- Pixelix websocket library -->
        <script type="text/javascript" src="/js/ws.js"></script>
        <script type="text/javascript" src="https://cdnjs.cloudflare.com/polyfill/v3/polyfill.js"></script>
        <!-- Pixelix menu -->
        <script type="text/javascript" src="/js/menu.js"></script>
        <script type="text/javascript" src="/js/pluginsSubMenu.js"></script>
        <script type="text/javascript" src="/js/servicesSubMenu.js"></script>
        <!-- Pixelix utilities -->
        <script type="text/javascript" src="/js/utils.js"></script>
        <script type="text/javascript" src="/js/dialog.js"></script>
        <!-- Pixelix REST API -->
        <script type="text/javascript" src="/js/rest.js"></script>
        <!-- Pixelix drag'n drop -->
        <script type="text/javascript" src="/js/dragDropTouch.js"></script>

        <!-- Custom javascript -->
        <script>
            var ctx                 = null;     // Canvas context
            var timerId             = 0;        // Timer id
            var period              = 400;      // Display refresh period in ms
            var wsClient            = new pixelix.ws.Client();
            var restClient          = new pixelix.rest.Client();
            var isPageUnload        = false;
            var plugins             = [];       // List of all available plugins
            var currentFadeEffect   = 0         // Fade effect [1;3]
            var currentSlotId       = -1;       // Currently active slot
            
            const PIXEL_WIDTH       = 10;                           // Width of a single LED in pixels
            const PIXEL_HEIGHT      = 10;                           // Height of a single LED in pixels
            const DISPLAY_WIDTH     = parseInt("~DISPLAY_WIDTH~");  // Width in pixels (Updated by webserver on send)
            const DISPLAY_HEIGHT    = parseInt("~DISPLAY_HEIGHT~"); // Height in pixels (Updated by webserver on send)

            const CANVAS_WIDTH      = (DISPLAY_WIDTH) * PIXEL_WIDTH + (DISPLAY_WIDTH) + 1;
            const CANVAS_HEIGHT     = (DISPLAY_HEIGHT) * PIXEL_HEIGHT + (DISPLAY_HEIGHT) + 1;

            /* Disable all UI elements. */
            function disableUI() {
                $("main :button").prop("disabled", true);
                $("main :input").prop("disabled", true);
            }

            /* Enable all UI elements. */
            function enableUI() {
                var automaticBrightnessControl = $("#bAutoBrightnessCtrl").val() === "true";

                $("main :button").prop("disabled", false);
                $("main :input").prop("disabled", false);

                if (true == automaticBrightnessControl) {
                    $("#currentBrightness").prop("disabled", true);
                }
            }

            /* If websocket connection is unexpectedly closed, clean up. */
            function wsOnClosed() {
                disableUI();

                window.clearTimeout(timerId);

                if (false === isPageUnload) {
                    dialog.showError("<p>Websocket connection closed.</p>");
                }
            }

            function plot(x, y, color) {
                if (null !== ctx) {
                    ctx.lineWidth   = "1";
                    ctx.strokeStyle = color;
                    ctx.fillStyle   = color;
                    ctx.fillRect(x * PIXEL_WIDTH + x + 1, y * PIXEL_HEIGHT + y + 1, PIXEL_WIDTH, PIXEL_HEIGHT);
                }
            }

            function getDisplayContent() {
                wsClient.getDisplayContent().then(function(rsp) {
                    let index   = 0;              // Index in input sequence.
                    let pixelIndex = 0;           // Index as pixel offset from framebuffer start.
                    
                    currentSlotId = rsp.slotId;
                    $("#slotId").text(rsp.slotId);
                    updateActiveSlot();

                    /* If necessary, resize the canvas. */
                    var $canvas = $("#canvas");
                    var ctx = $canvas[0].getContext('2d');

                    if ((ctx.canvas.width != CANVAS_WIDTH) || (ctx.canvas.height != CANVAS_HEIGHT)) {
                        ctx.canvas.width = CANVAS_WIDTH;
                        ctx.canvas.height = CANVAS_HEIGHT;
                    }                  

                    /* Handle display data */
                    while (index < rsp.data.length) {
                        let color   = rsp.data[index];
                        let repeat  = (color & 0xFF000000) >>> 24;
                        let red     = (color & 0x00FF0000) >>> 16;
                        let green   = (color & 0x0000FF00) >>> 8;
                        let blue    = (color & 0x000000FF) >>> 0;
                        let colFmt  = "rgb(" + red + ", " + green + ", " + blue + ")";

                        do {
                            let x = pixelIndex % DISPLAY_WIDTH;
                            let y = Math.floor(pixelIndex / DISPLAY_WIDTH);
                            
                            plot(x, y, colFmt);

                            --repeat;
                            ++pixelIndex;
                        } while (repeat >= 0);
                        ++index;
                    }
                    
                }).catch(function(err) {
                    if ("undefined" !== typeof err) {
                        console.error(err);
                    }
                }).finally(function() {
                    var isDisplayUpdateOn = $("#updateDisplayButton").val();

                    if ("true" === isDisplayUpdateOn) {
                        /* Start next update timer. */
                        timerId = window.setTimeout(getDisplayContent, period);
                    }
                });

                return;
            }

            function updateActiveSlot() {
                $(".slot-card").removeClass("active");
                if (currentSlotId >= 0) {
                    $("#slotCard" + currentSlotId).addClass("active");
                }
            }

            function install() {
                var pluginIndex = parseInt($("#pluginToInstall").val());
                var pluginName  = plugins[pluginIndex];
                disableUI();
                return wsClient.install({
                    pluginName: pluginName
                }).then(function(rsp) {
                    return updateSlotInfo();
                }).catch(function(err) {
                    if ("undefined" !== typeof err) {
                        console.error(err);
                    }
                    return dialog.showError("<p>Install " + pluginName + " failed.</p>");
                }).finally(function() {
                    enableUI();
                });
            }

            function uninstall(slotId) {
                disableUI();
                return wsClient.uninstall({
                    slotId: slotId
                }).then(function(rsp) {
                    return updateSlotInfo();
                }).catch(function(err) {
                    if ("undefined" !== typeof err) {
                        console.error(err);
                    }
                    return dialog.showError("<p>Uninstall slot " + slotId + " failed.</p>");
                }).finally(function() {
                    enableUI();
                });
            }

            function nextEffect() {
               return wsClient.setFadeEffect({
                fadeEffect:(currentFadeEffect + 1)
            }).then(function(rsp) {
                    currentFadeEffect = rsp.fadeEffect;
                    updateFadeEffect();
                }).catch(function(err) {
                    if ("undefined" !== typeof err) {
                        console.error(err);
                    }
                    return dialog.showError("<p>Failed.</p>");
                }).finally(function() {
                });
            }

            function updateFadeEffect() {
                /* Update label accordingly. */
                if (0 === currentFadeEffect) {
                    $("#lableFadeEffect").text("None");
                }
                else if (1 === currentFadeEffect) {
                    $("#lableFadeEffect").text("Linear");
                }
                else if (2 === currentFadeEffect) {
                    $("#lableFadeEffect").text("MoveX");
                }
                else if (3 === currentFadeEffect) {
                    $("#lableFadeEffect").text("MoveY");
                }
                else {
                    $("#lableFadeEffect").text("Unknown");
                }
            }

            function prevSlot() {
                var buttonActionIdPrevSlot = 2; /* See ButtonActionId */
                disableUI();

                return wsClient.triggerButton({"actionId": buttonActionIdPrevSlot}).then(function(rsp) {
                    /* Nothing to do */
                }).catch(function(err) {
                    if ("undefined" !== typeof err) {
                        console.error(err);
                    }
                    return dialog.showError("<p>Failed.</p>");
                }).finally(function() {
                    enableUI();
                });
            }

            function nextSlot() {
                var buttonActionIdNextSlot = 1; /* See ButtonActionId */
                disableUI();

                return wsClient.triggerButton({"actionId": buttonActionIdNextSlot}).then(function(rsp) {
                    /* Nothing to do */
                }).catch(function(err) {
                    if ("undefined" !== typeof err) {
                        console.error(err);
                    }
                    return dialog.showError("<p>Failed.</p>");
                }).finally(function() {
                    enableUI();
                });
            }

            function updateDisplay() {
                var isDisplayUpdateOn = $("#updateDisplayButton").val();

                disableUI();

                /* Currently off? */
                if ("false" === isDisplayUpdateOn) {
                    timerId = window.setTimeout(getDisplayContent, period);
                    $("#updateDisplayButton").text("Disable auto. display update");
                    $("#updateDisplayButton").val("true");
                } else {
                    window.clearTimeout(timerId);
                    $("#updateDisplayButton").text("Enable auto. display update");
                    $("#updateDisplayButton").val("false");
                }

                enableUI();
            }

            function updatetDisplayState() {
                return restClient.getDisplayState().then(function(rsp) {
                    $("#displayPowerButton").val(rsp.data.state);
                    $("#displayPowerButton").text(("off" === rsp.data.state) ? "Power On" : "Power Off");
                }).catch(function(err) {
                    if ("undefined" !== typeof err) {
                        console.error(err);
                    }
                    return dialog.showError("<p>Failed.</p>");
                });
            }

            function triggerDisplayState() {
                var powerState = $("#displayPowerButton").val();

                if ("off" === powerState) {
                    powerState = "on";
                } else {
                    powerState = "off";
                }

                disableUI();

                return restClient.setDisplayState(powerState).then(function(rsp) {
                    $("#displayPowerButton").val(powerState);
                    $("#displayPowerButton").text("off" === powerState ? "Power On" : "Power Off");
                }).catch(function(err) {
                    if ("undefined" !== typeof err) {
                        console.error(err);
                    }
                    return dialog.showError("<p>Failed.</p>");
                }).finally(function() {
                    enableUI();
                });
            }

            function move(uid, slotId) {
                return wsClient.move({
                    uid: uid,
                    slotId: slotId
                }).then(function(rsp) {
                }).catch(function(err) {
                    if ("undefined" !== typeof err) {
                        console.error(err);
                    }
                    return dialog.showError("<p>Moving failed.</p>");
                }).finally(function() {
                    return updateSlotInfo();
                });
            }

            function allowDrop(ev) {
                ev.preventDefault();
                $(ev.currentTarget).addClass("drag-over");
            }

            function drag(ev) {
                $(ev.currentTarget).addClass("dragging");
                ev.dataTransfer.setData("src", ev.currentTarget.id);
            }

            function onDragEnd(ev) {
                $(".slot-card").removeClass("dragging");
                $(".slot-card").removeClass("drag-over");
            }

            function onDragLeave(ev) {
                $(ev.currentTarget).removeClass("drag-over");
            }

            function drop(ev) {
                ev.preventDefault();
                $(".slot-card").removeClass("drag-over");

                var srcId = ev.dataTransfer.getData("src");
                var srcCard = $("#" + srcId).closest(".slot-card")[0];
                var dstCard = $(ev.currentTarget).closest(".slot-card")[0];

                if (!srcCard || !dstCard) return;

                var srcSlotId = parseInt($(srcCard).attr("data-slot-id"));
                var dstSlotId = parseInt($(dstCard).attr("data-slot-id"));

                if (srcSlotId !== dstSlotId) {
                    var uid = parseInt(srcId.replace("plugin", ""));
                    move(uid, dstSlotId);
                }
            }

            function setDuration(slotId) {
                var duration = parseInt($("#duration" + slotId).val()) * 1000;
                return wsClient.setSlotDuration({
                    slotId: slotId,
                    duration: duration
                }).then(function(rsp) {
                }).catch(function(err) {
                    if ("undefined" !== typeof err) {
                        console.error(err);
                    }
                    return dialog.showError("<p>Set duration failed.</p>");
                }).finally(function() {
                    return updateSlotInfo();
                });
            }

            function setFontType(pluginUid) {
                var fontType = $("#fontType" + pluginUid).val();

                return wsClient.setPluginFontType({
                    uid: pluginUid,
                    fontType: fontType
                }).then(function(rsp) {
                }).catch(function(err) {
                    if ("undefined" !== typeof err) {
                        console.error(err);
                    }
                    return dialog.showError("<p>Set font type failed.</p>");
                }).finally(function() {
                    return updateSlotInfo();
                });
            }

            function setAlias(pluginUid) {
                var alias = $("#alias" + pluginUid).val();
                return wsClient.setPluginAlias({
                    uid: pluginUid,
                    name: alias
                }).then(function(rsp) {
                }).catch(function(err) {
                    if ("undefined" !== typeof err) {
                        console.error(err);
                    }
                    return dialog.showError("<p>Set alias failed.</p>");
                }).finally(function() {
                    return updateSlotInfo();
                });
            }

            function updateSlotInfo() {
                return wsClient.getSlots().then(function(rsp) {
                    var $divSlots = $("#divSlots");
                    $divSlots.empty();
                    
                    for(var index = 0; index < rsp.slots.length; ++index) {
                        var slot = rsp.slots[index];
                        var $card = $("<div>")
                            .attr("class", "slot-card")
                            .attr("id", "slotCard" + index)
                            .attr("data-slot-id", index);

                        // Add status classes
                        if (slot.isLocked && slot.isSticky) {
                            $card.addClass("locked sticky");
                        } else if (slot.isLocked) {
                            $card.addClass("locked");
                        } else if (slot.isSticky) {
                            $card.addClass("sticky");
                        }

                        if (slot.isDisabled) {
                            $card.addClass("disabled");
                        }

                        // Enable drag and drop
                        if (!slot.isLocked && slot.name.length > 0) {
                            $card.attr("draggable", "true")
                                .attr("ondragstart", "drag(event)")
                                .attr("ondragend", "onDragEnd(event)");
                        }
                        $card.attr("ondragover", "allowDrop(event)")
                            .attr("ondragleave", "onDragLeave(event)")
                            .attr("ondrop", "drop(event)");

                        // Header
                        var $header = $("<div>").attr("class", "slot-header");
                        var $slotNum = $("<div>").attr("class", "slot-number").text("Slot " + index);
                        var $badges = $("<div>").attr("class", "slot-status-badges");

                        if (!slot.isDisabled) {
                            $badges.append($("<span>").attr("class", "status-badge active").text("Active"));
                        } else {
                            $badges.append($("<span>").attr("class", "status-badge disabled").text("Disabled"));
                        }

                        if (slot.isSticky) {
                            $badges.append($("<span>").attr("class", "status-badge sticky").text("Sticky"));
                        }

                        if (slot.isLocked) {
                            $badges.append($("<span>").attr("class", "status-badge locked").text("Locked"));
                        }

                        $header.append($slotNum).append($badges);
                        $card.append($header);

                        if (slot.name.length === 0) {
                            // Empty slot
                            $card.append($("<div>").attr("class", "plugin-empty").text("Empty slot - drop a plugin here"));
                        } else {
                            // Plugin info
                            var $pluginInfo = $("<div>")
                                .attr("class", "plugin-info")
                                .attr("id", "plugin" + slot.uid);

                            $pluginInfo.append($("<div>").attr("class", "plugin-name").text(slot.name));
                            $pluginInfo.append($("<div>").attr("class", "plugin-uid").text("UID: " + slot.uid));

                            // Alias
                            var $aliasGroup = $("<div>").attr("class", "alias-group");
                            $aliasGroup.append($("<label>").attr("class", "alias-label").text("Alias"));
                            $aliasGroup.append(
                                $("<input>")
                                    .attr("class", "alias-input")
                                    .attr("id", "alias" + slot.uid)
                                    .attr("type", "text")
                                    .attr("value", slot.alias || "")
                                    .attr("placeholder", "Enter alias...")
                                    .attr("maxlength", "8")
                                    .attr("onchange", "setAlias(" + slot.uid + ")")
                            );
                            $pluginInfo.append($aliasGroup);

                            // Font Type
                            var $fontTypeGroup = $("<div>").attr("class", "font-type-control");
                            $fontTypeGroup.append($("<label>").attr("class", "font-type-label").text("Font Type"));
                            var $fontTypeSelect = $("<select>")
                                .attr("class", "form-select")
                                .attr("id", "fontType" + slot.uid)
                                .attr("onchange", "setFontType(" + slot.uid + ")");
                            
                            $fontTypeSelect.append($("<option>").val("default").text("Default"));
                            $fontTypeSelect.append($("<option>").val("normal").text("Normal"));
                            $fontTypeSelect.append($("<option>").val("large").text("Large"));
                            $fontTypeSelect.val(slot.fontType);
                            
                            $fontTypeGroup.append($fontTypeSelect);
                            $pluginInfo.append($fontTypeGroup);

                            $card.append($pluginInfo);
                        }

                        // Duration control
                        var $durationControl = $("<div>").attr("class", "duration-control");
                        var $durationGroup = $("<div>").attr("class", "duration-input-group");
                        $durationGroup.append(
                            $("<input>")
                                .attr("class", "duration-input")
                                .attr("id", "duration" + index)
                                .attr("type", "number")
                                .attr("value", slot.duration / 1000)
                                .attr("min", "1")
                                .attr("max", "3600")
                                .attr("onchange", "setDuration(" + index + ")")
                        );
                        $durationGroup.append($("<span>").attr("class", "duration-unit").text("sec"));
                        $durationControl.append($durationGroup);
                        $card.append($durationControl);

                        // Action buttons
                        var $actions = $("<div>").attr("class", "slot-actions");
                        
                        var $stickyBtn = $("<button>")
                            .attr("class", slot.isSticky ? "icon-btn active" : "icon-btn warning")
                            .attr("onclick", "handleStickySlot(" + index + ")")
                            .attr("title", "Toggle sticky flag")
                            .html(slot.isSticky ? "📌 Sticky" : "📌 Make Sticky");

                        var $statusBtn = $("<button>")
                            .attr("class", slot.isDisabled ? "icon-btn" : "icon-btn active")
                            .attr("onclick", "handleSlotStatus(" + index + ")")
                            .attr("title", "Toggle slot enable/disable")
                            .html(slot.isDisabled ? "✓ Enable" : "✓ Enabled");

                        $actions.append($statusBtn).append($stickyBtn);

                        if (!slot.isLocked && slot.name.length > 0) {
                            var $uninstallBtn = $("<button>")
                                .attr("class", "icon-btn danger")
                                .attr("onclick", "uninstall(" + index + ")")
                                .attr("title", "Uninstall plugin")
                                .html("🗑 Remove");
                            $actions.append($uninstallBtn);
                        }

                        $card.append($actions);
                        $divSlots.append($card);
                    }

                    updateActiveSlot();
                });
            }

            function handleSlotStatus(slotId) {
                var slot = $(".slot-card[data-slot-id='" + slotId + "']");
                var isDisabled = !slot.hasClass("disabled");
                disableUI();
                return wsClient.setSlot({
                    slotId: slotId,
                    isDisabled: isDisabled
                }).then(function(rsp) {
                    return updateSlotInfo();
                }).catch(function(err) {
                    if ("undefined" !== typeof err) {
                        console.error(err);
                    }
                    return dialog.showError("<p>Failed.</p>");
                }).finally(function() {
                    enableUI();
                });
            }

            function handleStickySlot(slotId) {
                var slot = $(".slot-card[data-slot-id='" + slotId + "']");
                var sticky = !slot.hasClass("sticky");
                disableUI();
                return wsClient.setSlot({
                    slotId: slotId,
                    sticky: sticky
                }).then(function(rsp) {
                    return updateSlotInfo();
                }).catch(function(err) {
                    if ("undefined" !== typeof err) {
                        console.error(err);
                    }
                    return dialog.showError("<p>Failed.</p>");
                }).finally(function() {
                    enableUI();
                });
            }

            function calcPercentage(value) {
                return (value * 100 / 255).toFixed(1);
            }

            function updateCurrentBrightness(brightness) {
                var brightnessInPercent = calcPercentage(brightness);
                $("#currentBrightnessValue").text("" + brightnessInPercent + " %");
                $("#currentBrightness").val(brightness);
            }

            function updateMinBrightness(minBrightness) {
                var minBrightnessInPercent = calcPercentage(minBrightness);
                $("#minBrightnessValue").text("" + minBrightnessInPercent + " %");
                $("#minBrightness").val(minBrightness);
            }

            function updateMaxBrightness(maxBrightness) {
                var maxBrightnessInPercent = calcPercentage(maxBrightness);
                $("#maxBrightnessValue").text("" + maxBrightnessInPercent + " %");
                $("#maxBrightness").val(maxBrightness);
            }

            function updateAutoBrightnessCtrl(autoBrightnessCtrl) {
                if (false === autoBrightnessCtrl) {
                    $("#autoBrightnessStatus").text("Disabled");
                    $("#bAutoBrightnessCtrl").text("Enable");
                    $("#bAutoBrightnessCtrl").val("false");
                    $("#currentBrightness").prop("disabled", false);
                } else {
                    $("#autoBrightnessStatus").text("Enabled");
                    $("#bAutoBrightnessCtrl").text("Disable");
                    $("#bAutoBrightnessCtrl").val("true");
                    $("#currentBrightness").prop("disabled", true);
                }
            }

            function triggerAutoBrightnessCtrl() {
                var autoBrightnessCtrl = $("#bAutoBrightnessCtrl").val() === "true";
                if (false === autoBrightnessCtrl) {
                    $("#autoBrightnessStatus").text("Enabled");
                    $("#bAutoBrightnessCtrl").text("Disable");
                    $("#bAutoBrightnessCtrl").val("true");
                } else {
                    $("#autoBrightnessStatus").text("Disabled");
                    $("#bAutoBrightnessCtrl").text("Enable");
                    $("#bAutoBrightnessCtrl").val("false");
                }
            }

            function changeBrightness() {
                var currentBrightness = parseInt($("#currentBrightness").val());
                var minBrightness = parseInt($("#minBrightness").val());
                var maxBrightness = parseInt($("#maxBrightness").val());
                var autoBrightnessCtrl = $("#bAutoBrightnessCtrl").val() === "true";
                disableUI();
                wsClient.setBrightness({
                    brightness: currentBrightness,
                    minBrightness: minBrightness,
                    maxBrightness: maxBrightness,
                    automaticBrightnessControl: autoBrightnessCtrl
                }).then(function(rsp) {
                    updateCurrentBrightness(rsp.brightness);
                    updateMinBrightness(rsp.minBrightness);
                    updateMaxBrightness(rsp.maxBrightness);
                    updateAutoBrightnessCtrl(rsp.automaticBrightnessControl);
                }).catch(function(err) {
                    if ("undefined" !== typeof err) {
                        console.error(err);
                    }
                    return dialog.showError("<p>Changing brightness failed.</p>");
                }).finally(function() {
                    enableUI();
                });
            }

            /* Execute after page is ready. */
            $(document).ready(function() {
                var displayCanvas = document.getElementById("canvas");
                ctx = displayCanvas.getContext("2d");

                menu.addSubMenu(menu.data, "Plugins", pluginSubMenu);
                menu.addSubMenu(menu.data, "Services", serviceSubMenu);
                menu.create("menu", menu.data);

                /* Connect to pixelix */
                wsClient.connect({
                    protocol: "~WS_PROTOCOL~",
                    hostname: location.hostname,
                    port: parseInt("~WS_PORT~"),
                    endpoint: "~WS_ENDPOINT~",
                    onClosed: wsOnClosed
                }).then(function(rsp) {
                    /* Get list of available plugins */
                    return wsClient.getPlugins();
                }).then(function(rsp) {
                    var index = 0;

                    /* Store plugin list */
                    plugins = rsp.plugins;

                    /* Update plugin dropdown list */
                    for(index = 0; index < plugins.length; ++index) {
                        $("<option>").val(index).text(plugins[index]).appendTo("#pluginToInstall");
                    }

                    /* Update the slot informations, shown to user. */
                    return updateSlotInfo();
                }).then(function(rsp) {
                    /* Get brightness information */
                    return wsClient.getBrightness();
                }).then(function(rsp) {
                    updateCurrentBrightness(rsp.brightness);
                    updateMinBrightness(rsp.minBrightness);
                    updateMaxBrightness(rsp.maxBrightness);
                    updateAutoBrightnessCtrl(rsp.automaticBrightnessControl);
                }).then(function(rsp) {
                    /* Get fadeEffect information */
                    return wsClient.getFadeEffect();
                }).then(function(rsp) {
                    currentFadeEffect = rsp.fadeEffect;
                    updateFadeEffect();
                }).then(function(rsp) {
                    /* Update display state */
                    return updatetDisplayState();
                }).then(function(rsp) {
                    /* UI is enabled at least. */
                    enableUI();
                }).catch(function(err) {
                    if ("undefined" !== typeof err) {
                        console.error(err);
                    }
                });
            });

            /* If the page is left, there shall be no message shown regarding
             * unexpected websocket lost.
             */
             $(window).bind("beforeunload", function() {
                isPageUnload = true;

                if (null !== wsClient) {
                    wsClient.disconnect();
                }
            });
        </script>
    </body>
</html>
